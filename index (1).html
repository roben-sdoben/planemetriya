    // Angle marks: A and C equal, B and D equal (supplementary)
    s.angleMarks.push({v:pa,d1:pd_,d2:pb,label:angle+'°'});
    s.angleMarks.push({v:pc,d1:pb,d2:pd_,label:angle+'°'});
    // Diagonals
    if(has('diagonal')||d1||d2){
      s.dashed.push([pa,pc],[pb,pd_]);
      const O=lineIntersect(pa,pc,pb,pd_);
      if(O){P(O.x,O.y,ctx.intersectionPt||'O');
        s.rightAngles.push({v:s.points[ctx.intersectionPt||'O'],d1:pa,d2:pb});
        // Equal halves
        const pO=s.points[ctx.intersectionPt||'O'];
        s.equalMarks.push([[pa,pO],[pO,pc]],[[pb,pO],[pO,pd_]]);
      }
    }
    for(const seg in segs){const[l1,l2]=seg.split('');if(s.points[l1]&&s.points[l2])s.dims.push({p1:s.points[l1],p2:s.points[l2],text:fmtNum(segs[seg])});}
    return s;
  }

  if(S==='rectangle'){
    const[A,B,C,D]=ctx.quadVerts;let w=10,h=6,diag=ctx.diag1||null;
    let perim=ctx.perimeter;
    for(const seg in segs){
      if([A+B,B+A,C+D,D+C].includes(seg))h=segs[seg];
      else if([B+C,C+B,A+D,D+A].includes(seg))w=segs[seg];
      else if([A+C,C+A,B+D,D+B].includes(seg))diag=segs[seg];
    }
    if(ctx.sides&&ctx.sides.a&&ctx.sides.b){w=max(ctx.sides.a,ctx.sides.b);h=min(ctx.sides.a,ctx.sides.b);}
    if(perim&&diag){const sP=perim/2,wh=(sP*sP-diag*diag)/2,disc=sP*sP-4*wh;if(disc>=0){w=(sP+sqrt(disc))/2;h=sP-w;}}
    if(perim&&!diag&&w===10){w=perim/2*0.6;h=perim/2-w;}
    const pa=P(0,0,A),pb=P(0,h,B),pc=P(w,h,C),pd=P(w,0,D);
    s.lines.push([pa,pb],[pb,pc],[pc,pd],[pd,pa]);
    // Right angles at all corners
    [[pa,pd,pb],[pb,pa,pc],[pc,pb,pd],[pd,pc,pa]].forEach(([v,d1_,d2_])=>s.rightAngles.push({v,d1:d1_,d2:d2_}));
    // Equal opposite sides
    s.equalMarks.push([[pa,pb],[pc,pd]]);
    s.equalMarks.push([[pb,pc],[pd,pa]]);
    // Diagonal
    if(diag||has('diagonal')){
      s.dashed.push([pa,pc]);
      if(diag)s.dims.push({p1:pa,p2:pc,text:'d='+fmtNum(diag)});
    }
    // Dimensions
    s.dims.push({p1:pa,p2:pd,text:fmtNum(w)},{p1:pa,p2:pb,text:fmtNum(h)});
    addQuadExtra(ctx,s,[A,B,C,D]);
    return s;
  }

  if(S==="square"){
    const[A,B,C,D]=ctx.quadVerts;let side=8;
    for(const seg in segs){side=segs[seg];break;}
    const pa=P(0,0,A),pb=P(0,side,B),pc=P(side,side,C),pd=P(side,0,D);
    s.lines.push([pa,pb],[pb,pc],[pc,pd],[pd,pa]);
    return s;
  }


  // ===================== PERP BISECTOR =====================
  if(S==='perp_bisector'){
    let AB=10;for(const seg in segs){AB=segs[seg];break;}
    const A=P(-AB/2,0,'A'),B=P(AB/2,0,'B'),M=P(0,0,'M');
    let PM=7; if(segs.PM||segs.MP)PM=segs.PM||segs.MP;
    const Pp=P(0,PM,'P');
    s.lines.push([A,B]);
    s.dashed.push([P(0,-PM*0.3,''),Pp]);
    s.rightAngles.push({v:M,d1:B,d2:Pp});
    s.equalMarks.push([[A,M],[M,B]]);
    if(segs.PM||segs.MP)s.dims.push({p1:Pp,p2:M,text:fmtNum(PM)});
    s.dims.push({p1:A,p2:B,text:fmtNum(AB)});
    return s;
  }

  return s;
}

// ====== Add heights / medians / bisectors to a QUADRILATERAL ======
// pts4: {A,B,C,D} from s.points; labs: [A,B,C,D] labels; s: solution object
function addQuadExtra(ctx, s, labs) {
  const [A,B,C,D] = labs;
  const pts = s.points;
  const tl = ctx.tl, raw = ctx.raw;
  const P = (x,y,l) => { const p={x,y,label:l}; if(l) s.points[l]=p; return p; };

  const sides = [
    [A,B],[B,C],[C,D],[D,A]
  ];

  // Helper: foot of perpendicular from point p to segment (a,b)
  function foot(p, a, b) {
    const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy;
    if(len2<1e-9) return {x:a.x,y:a.y};
    const t=((p.x-a.x)*dx+(p.y-a.y)*dy)/len2;
    return {x:a.x+t*dx, y:a.y+t*dy};
  }

  // --- Height in quad ---
  if(ctx.features.includes('height') || /высот/.test(tl)) {
    // try to find "высота XY" or "XY — высота" or "высота из X"
    const hm = raw.match(/высот[а-яёa-z0-9]*\s+([A-Z])([A-Z])/i)
             || raw.match(/([A-Z])([A-Z])\s*[-—–]\s*высот/i);
    let fromL = null, footL = null;
    if(hm) { fromL = hm[1].toUpperCase(); footL = hm[2].toUpperCase(); }
    if(!fromL) {
      const hm2 = raw.match(/высот[а-яёa-z0-9]*\s+из\s+(?:вершины\s+)?([A-Z])/i);
      if(hm2) fromL = hm2[1].toUpperCase();
    }
    if(!fromL) fromL = C; // default: from C in quadrilateral
    if(!footL) footL = 'H';

    const fromPt = pts[fromL];
    if(fromPt && !pts[footL]) {
      // find the opposite side (the side not containing fromL)
      const oppSide = sides.find(([x,y]) => x!==fromL && y!==fromL);
      if(oppSide) {
        const a = pts[oppSide[0]], b = pts[oppSide[1]];
        if(a && b) {
          const f = foot(fromPt, a, b);
          const H = P(f.x, f.y, footL);
          s.dashed.push([fromPt, H]);
          s.rightAngles.push({v:H, d1:fromPt, d2:b});
        }
      }
    }
  }

  // --- Median in quad (connects midpoints of opposite sides) ---
  if(ctx.features.includes('median') || /медиан/.test(tl)) {
    // "медиана KM" or "средняя линия" -- for quad, median = midline between two sides
    const mm = raw.match(/медиан[а-яёa-z0-9]*\s+([A-Z])([A-Z])/i);
    let p1L = null, p2L = null;
    if(mm) { p1L = mm[1].toUpperCase(); p2L = mm[2].toUpperCase(); }
    if(!p1L) { p1L = 'M'; p2L = 'N'; }
    if(!pts[p1L] && !pts[p2L]) {
      // midpoints of AB and CD
      const a=pts[A],b=pts[B],c=pts[C],d=pts[D];
      if(a&&b&&c&&d) {
        const m1 = P((a.x+b.x)/2,(a.y+b.y)/2,p1L);
        const m2 = P((c.x+d.x)/2,(c.y+d.y)/2,p2L);
        s.dashed.push([m1,m2]);
        s.equalMarks.push([[a,m1],[m1,b]]);
        s.equalMarks.push([[c,m2],[m2,d]]);
      }
    }
  }

  // --- Single bisector at a vertex in quad ---
  if(ctx.features.includes('bisector') || /биссектрис/.test(tl)) {
    // already handled if two bisectors; handle single bisector
    const bm = raw.match(/биссектрис[а-яёa-z0-9]*\s+угл[а-яёa-z0-9]*\s+([A-Z])[^и]/i)
             || raw.match(/биссектрис[а-яёa-z0-9]*\s+(?:из\s+)?(?:вершины\s+)?([A-Z])\s/i);
    if(bm) {
      const fromL = bm[1].toUpperCase();
      const idx = labs.indexOf(fromL);
      if(idx >= 0) {
        const pts4 = labs.map(l => pts[l]);
        const bd = quadBisDir(idx, pts4, labs);
        if(bd) {
          // intersect with opposite sides
          const oppSides = sides.filter(([x,y]) => x!==fromL && y!==fromL);
          let best = null, bestD = Infinity;
          const end = {x: bd.vp.x + bd.x*1000, y: bd.vp.y + bd.y*1000};
          for(const [sl1,sl2] of oppSides) {
            const ip = lineIntersect(bd.vp, end, pts[sl1], pts[sl2]);
            if(ip) {
              const d_ = dist(bd.vp, ip);
              if(d_ > 1 && d_ < bestD) { bestD=d_; best=ip; }
            }
          }
          if(best) {
            const bLabel = raw.match(/биссектрис[а-яёa-z0-9]*\s+[A-Z]{2}/i)
              ? raw.match(/биссектрис[а-яёa-z0-9]*\s+([A-Z])([A-Z])/i)?.[2] : 'E';
            const pE = P(best.x, best.y, bLabel||'E');
            s.dashed.push([bd.vp, pE]);
          }
        }
      }
    }
  }
}

// Add extra elements to a triangle (heights, medians, bisectors)
function addExtra(ctx,s,pts,vA,vB,vC,sAB,sBC,sAC){
  const tA=pts[vA],tB=pts[vB],tC=pts[vC];
  const tl=ctx.tl;
  const P=(x,y,l)=>{const p={x,y,label:l};if(l)s.points[l]=p;return p;};

  // --- Heights ---
  if(ctx.features.includes('height')||/высот/.test(tl)){
    const hm=ctx.raw.match(/высот[а-яёa-z0-9]*\s+([A-Z])([A-Z])?/);
    let fromV=null,hLabel=null;
    if(hm){fromV=hm[1];hLabel=hm[2]||'H';}
    if(!fromV){
      const hm2=ctx.raw.match(/высот[а-яёa-z0-9]*\s+из\s+(?:вершины\s+)?([A-Z])/);
      if(hm2)fromV=hm2[1];
    }
    if(!fromV)fromV=vA;
    if(!hLabel)hLabel='H';

    const fromPt=pts[fromV];
    const oppVerts=[vA,vB,vC].filter(v=>v!==fromV);
    const oppA=pts[oppVerts[0]],oppB=pts[oppVerts[1]];
    const foot=footPerp(fromPt,oppA,oppB);
    const H=P(foot.x,foot.y,hLabel);
    s.dashed.push([fromPt,H]);
    s.rightAngles.push({v:H,d1:fromPt,d2:oppB});
    // For obtuse triangles: if foot is OUTSIDE segment oppA-oppB → extend the base
    const dx=oppB.x-oppA.x,dy=oppB.y-oppA.y,len2=dx*dx+dy*dy;
    if(len2>0){
      const t=((foot.x-oppA.x)*dx+(foot.y-oppA.y)*dy)/len2;
      if(t<-0.01||t>1.01){
        // Foot is outside → draw dashed extension from nearest vertex to foot
        const nearest=t<0?oppA:oppB;
        s.dashed.push([nearest,H]);
      }
    }
  }

  // --- Medians ---
  if(ctx.features.includes('median')||/медиан/.test(tl)){
    const mm=ctx.raw.match(/медиан[а-яёa-z0-9]*\s+([A-Z])([A-Z])?/);
    let fromV=null,mLabel=null;
    if(mm){fromV=mm[1];mLabel=mm[2]||'M';}
    if(!fromV){
      const mm2=ctx.raw.match(/медиан[а-яёa-z0-9]*\s+из\s+(?:вершины\s+)?([A-Z])/);
      if(mm2)fromV=mm2[1];
    }
    if(!fromV)fromV=vB;
    if(!mLabel)mLabel='M';

    const fromPt=pts[fromV];
    const oppVerts=[vA,vB,vC].filter(v=>v!==fromV);
    const oppA=pts[oppVerts[0]],oppB=pts[oppVerts[1]];
    const M=P((oppA.x+oppB.x)/2,(oppA.y+oppB.y)/2,mLabel);
    s.dashed.push([fromPt,M]);
    s.equalMarks.push([[oppA,M],[M,oppB]]);
  }

  // --- Bisectors ---
  if(ctx.features.includes('bisector')||/биссектрис/.test(tl)){
    const bm=ctx.raw.match(/биссектрис[а-яёa-z0-9]*\s+([A-Z])([A-Z])?/);
    let fromV=null,bLabel=null;
    if(bm){fromV=bm[1];bLabel=bm[2]||'D';}
    if(!fromV)fromV=vA;
    if(!bLabel)bLabel='D';

    const fromPt=pts[fromV];
    const oppVerts=[vA,vB,vC].filter(v=>v!==fromV);
    const oppA=pts[oppVerts[0]],oppB=pts[oppVerts[1]];
    // Bisector divides opposite side in ratio of adjacent sides
    const dA=dist(fromPt,oppA),dB=dist(fromPt,oppB);
    const t=dA/(dA+dB);
    const D_=P(oppA.x+(oppB.x-oppA.x)*t, oppA.y+(oppB.y-oppA.y)*t, bLabel);
    s.dashed.push([fromPt,D_]);
  }

  // --- Diagonals in quad are handled elsewhere ---
}

function fmtNum(v){
  if(v===undefined||v===null)return'';
  if(abs(v-Math.round(v))<0.01)return String(Math.round(v));
  return v.toFixed(1);
}

// ============ RENDERER ============
function render(sol,W=720,H=540){
  const PAD=70,pts=sol.points,aX=[],aY=[];
  for(const p of Object.values(pts)){if(p.label!==undefined)aX.push(p.x);aY.push(p.y);}
  for(const c of sol.circles){aX.push(c.center.x-c.radius,c.center.x+c.radius);aY.push(c.center.y-c.radius,c.center.y+c.radius);}
  if(!aX.length)return errSvg(W,H);

  const mnX=min(...aX),mxX=max(...aX),mnY=min(...aY),mxY=max(...aY);
  const rX=mxX-mnX||10,rY=mxY-mnY||10,dW=W-2*PAD,dH=H-2*PAD;
  const sc=min(dW/rX,dH/rY);
  const tx=x=>PAD+(x-mnX)*sc+(dW-rX*sc)/2;
  const ty=y=>H-PAD-(y-mnY)*sc-(dH-rY*sc)/2;

  let o=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  o+=`<defs><filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".06"/></filter></defs>`;
  o+=`<rect width="${W}" height="${H}" fill="#faf9f7" rx="12" filter="url(#sh)"/>`;
  o+=`<style>
.L{stroke:#1b1b1e;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.D{stroke:#9a9590;stroke-width:1.5;stroke-dasharray:7,4;stroke-linecap:round;fill:none}
.C{stroke:#1b1b1e;stroke-width:2;fill:none}
.P{fill:#1b1b1e}
.T{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;fill:#1b1b1e;font-style:italic;font-weight:600}
.V{font-family:'DM Sans',sans-serif;font-size:12px;fill:#8a7e73}
.R{stroke:#b44a2d;stroke-width:1.5;fill:none}
.E{stroke:#2d6b4f;stroke-width:2;stroke-linecap:round}
.A{stroke:#b44a2d;stroke-width:1.3;fill:none}
.AL{font-family:'Cormorant Garamond',serif;font-size:14px;fill:#b44a2d;font-style:italic}
.HA{stroke:#b44a2d;stroke-width:3.5;fill:none;stroke-linecap:round;opacity:.55}
</style>`;

  // Circles
  for(const c of sol.circles)
    o+=`<circle cx="${tx(c.center.x).toFixed(1)}" cy="${ty(c.center.y).toFixed(1)}" r="${(c.radius*sc).toFixed(1)}" class="C"/>`;

  // Highlighted arcs on circle
  for(const ha of sol.highlightArcs||[]){
    const cx_=tx(ha.center.x),cy_=ty(ha.center.y),r_=ha.radius*sc;
    const p1x=tx(ha.p1.x),p1y=ty(ha.p1.y),p2x=tx(ha.p2.x),p2y=ty(ha.p2.y);
    // Compute angles in screen space (y inverted)
    const a1=atan2(p1y-cy_,p1x-cx_), a2=atan2(p2y-cy_,p2x-cx_);
    // Draw minor arc from p1 to p2
    let sweep=1, largeArc=0;
    // Determine if we need large arc
    let diff=a2-a1; if(diff<0)diff+=2*PI;
    if(ha.minor){largeArc=diff>PI?1:0;}
    else{largeArc=diff>PI?0:1;}
    o+=`<path d="M${p1x.toFixed(1)},${p1y.toFixed(1)}A${r_.toFixed(1)},${r_.toFixed(1)},0,${largeArc},${sweep},${p2x.toFixed(1)},${p2y.toFixed(1)}" class="HA"/>`;
  }

  // Lines
  for(const[p1,p2]of sol.lines)
    o+=`<line x1="${tx(p1.x).toFixed(1)}" y1="${ty(p1.y).toFixed(1)}" x2="${tx(p2.x).toFixed(1)}" y2="${ty(p2.y).toFixed(1)}" class="L"/>`;

  // Dashed
  for(const[p1,p2]of sol.dashed)
    o+=`<line x1="${tx(p1.x).toFixed(1)}" y1="${ty(p1.y).toFixed(1)}" x2="${tx(p2.x).toFixed(1)}" y2="${ty(p2.y).toFixed(1)}" class="D"/>`;

  // Right angles
  for(const m of sol.rightAngles){
    const vx=tx(m.v.x),vy=ty(m.v.y);
    const d1x=tx(m.d1.x),d1y=ty(m.d1.y),d2x=tx(m.d2.x),d2y=ty(m.d2.y);
    const l1=hypot(d1x-vx,d1y-vy),l2=hypot(d2x-vx,d2y-vy);
    if(l1<2||l2<2)continue;
    const sz=12;
    const ux1=(d1x-vx)/l1*sz,uy1=(d1y-vy)/l1*sz,ux2=(d2x-vx)/l2*sz,uy2=(d2y-vy)/l2*sz;
    o+=`<path d="M${(vx+ux1).toFixed(1)},${(vy+uy1).toFixed(1)}L${(vx+ux1+ux2).toFixed(1)},${(vy+uy1+uy2).toFixed(1)}L${(vx+ux2).toFixed(1)},${(vy+uy2).toFixed(1)}" class="R"/>`;
  }

  // Angle marks (arcs with labels)
  for(const m of sol.angleMarks||[]){
    const vx=tx(m.v.x),vy=ty(m.v.y);
    const p1x=tx(m.d1.x),p1y=ty(m.d1.y),p2x=tx(m.d2.x),p2y=ty(m.d2.y);
    let a1=atan2(p1y-vy,p1x-vx),a2=atan2(p2y-vy,p2x-vx);
    if(a2<a1)a2+=2*PI;
    if(a2-a1>PI){const tmp=a1;a1=a2;a2=tmp+2*PI;}
    const r=22;
    o+=`<path d="M${(vx+r*cos(a1)).toFixed(1)},${(vy+r*sin(a1)).toFixed(1)}A${r},${r},0,0,1,${(vx+r*cos(a2)).toFixed(1)},${(vy+r*sin(a2)).toFixed(1)}" class="A"/>`;
    const mid_=(a1+a2)/2;
    o+=`<text x="${(vx+34*cos(mid_)).toFixed(1)}" y="${(vy+34*sin(mid_)).toFixed(1)}" class="AL" text-anchor="middle" dominant-baseline="middle">${m.label||''}</text>`;
  }

  // Inscribed angle arc marks
  for(const m of sol.arcMarks||[]){
    const vx=tx(m.vertex.x),vy=ty(m.vertex.y);
    const p1x=tx(m.p1.x),p1y=ty(m.p1.y),p2x=tx(m.p2.x),p2y=ty(m.p2.y);
    let a1=atan2(p1y-vy,p1x-vx),a2=atan2(p2y-vy,p2x-vx);
    if(a2<a1)a2+=2*PI;
    const r=25;
    o+=`<path d="M${(vx+r*cos(a1)).toFixed(1)},${(vy+r*sin(a1)).toFixed(1)}A${r},${r},0,${(a2-a1>PI)?1:0},1,${(vx+r*cos(a2)).toFixed(1)},${(vy+r*sin(a2)).toFixed(1)}" class="A"/>`;
    const mid_=(a1+a2)/2;
    o+=`<text x="${(vx+38*cos(mid_)).toFixed(1)}" y="${(vy+38*sin(mid_)).toFixed(1)}" class="AL" text-anchor="middle" dominant-baseline="middle">${m.label||''}</text>`;
  }

  // Equal marks
  for(let gi=0;gi<sol.equalMarks.length;gi++){
    const ticks=gi+1;
    for(const pair of sol.equalMarks[gi]){
      if(pair.length!==2)continue;const[p1,p2]=pair;
      const mx=(tx(p1.x)+tx(p2.x))/2,my=(ty(p1.y)+ty(p2.y))/2;
      const dx=tx(p2.x)-tx(p1.x),dy=ty(p2.y)-ty(p1.y),len=hypot(dx,dy);if(len<2)continue;
      const nx=-dy/len,ny=dx/len;
      for(let i=0;i<ticks;i++){
        const off=(i-(ticks-1)/2)*5;
        const cx_=mx+dx/len*off,cy_=my+dy/len*off;
        o+=`<line x1="${(cx_-nx*7).toFixed(1)}" y1="${(cy_-ny*7).toFixed(1)}" x2="${(cx_+nx*7).toFixed(1)}" y2="${(cy_+ny*7).toFixed(1)}" class="E"/>`;
      }
    }
  }

  // Dimension labels
  for(const dm of sol.dims){
    const mx=(tx(dm.p1.x)+tx(dm.p2.x))/2,my=(ty(dm.p1.y)+ty(dm.p2.y))/2;
    const dx=ty(dm.p1.y)-ty(dm.p2.y),dy=tx(dm.p2.x)-tx(dm.p1.x);
    const len=hypot(dx,dy)||1;
    o+=`<text x="${(mx+dx/len*16).toFixed(1)}" y="${(my+dy/len*16).toFixed(1)}" class="V" text-anchor="middle" dominant-baseline="middle">${dm.text}</text>`;
  }

  // Points & labels (smart placement)
  const cx_=Object.values(pts).reduce((s,p)=>s+tx(p.x),0)/max(Object.keys(pts).length,1);
  const cy_=Object.values(pts).reduce((s,p)=>s+ty(p.y),0)/max(Object.keys(pts).length,1);
  for(const[label,p]of Object.entries(pts)){
    if(!label)continue;
    const px=tx(p.x),py=ty(p.y);
    o+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" class="P"/>`;
    let dx=px-cx_,dy=py-cy_,d=hypot(dx,dy);
    if(d<1){dx=0;dy=-1;d=1;}
    const off=20;
    o+=`<text x="${(px+dx/d*off).toFixed(1)}" y="${(py+dy/d*off).toFixed(1)}" class="T" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
  }

  return o+'</svg>';
}

function errSvg(W,H){
  return`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}"><rect width="${W}" height="${H}" fill="#faf9f7" rx="12"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#b44a2d" font-size="16" font-family="DM Sans,sans-serif">Не удалось построить чертёж. Попробуйте переформулировать задачу.</text></svg>`;
}

return{parse,solve,render};
})();

// ====== UI ======
const ta=document.getElementById('ta'),genBtn=document.getElementById('gen'),clrBtn=document.getElementById('clr');
const exSel=document.getElementById('ex'),svgBox=document.getElementById('svg-box');
const ph=document.getElementById('ph'),errEl=document.getElementById('err'),nfoEl=document.getElementById('nfo');
const dlBar=document.getElementById('dlbar');let curSvg='';

EXAMPLES.forEach((e,i)=>{const o=document.createElement('option');o.value=i;o.textContent=e.t;exSel.appendChild(o);});
exSel.addEventListener('change',function(){if(this.value!==''){ta.value=EXAMPLES[+this.value].s;ta.focus();}});
genBtn.addEventListener('click',generate);
ta.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')generate();});
clrBtn.addEventListener('click',()=>{ta.value='';svgBox.innerHTML='';curSvg='';ph.style.display='';dlBar.classList.remove('vis');errEl.classList.remove('vis');nfoEl.classList.remove('vis');exSel.selectedIndex=0;ta.focus();});
document.getElementById('dl').addEventListener('click',()=>{if(!curSvg)return;const b=new Blob([curSvg],{type:'image/svg+xml'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='geometry.svg';a.click();URL.revokeObjectURL(a.href);});
document.getElementById('cp').addEventListener('click',function(){if(!curSvg)return;navigator.clipboard.writeText(curSvg).then(()=>{this.textContent='✓ Скопировано';setTimeout(()=>this.innerHTML='⎘ Копировать',1500);});});

function generate(){
  const text=ta.value.trim();if(!text){showErr('Введите условие задачи');return;}
  errEl.classList.remove('vis');nfoEl.classList.remove('vis');
  try{
    const parsed=GEO.parse(text);
    const solution=GEO.solve(parsed);
    curSvg=GEO.render(solution);
    svgBox.innerHTML=curSvg;ph.style.display='none';dlBar.classList.add('vis');

    const nm={tangent_secant:'Касательная + секущая',tangent_only:'Касательная',two_tangents:'Две касательные',chord_perp_radius:'Хорда ⊥ радиусу',chord_distance:'Хорда → расстояние',inscribed_angle:'Вписанный угол',central_angle:'Центральный угол',central_and_inscribed:'Центральный + вписанный',inscribed_angle_diameter:'Угол на диаметр (Фалес)',inscribed_angle_tangent:'Вписанный угол + касательная',two_inscribed_angles:'Два вписанных на одну дугу',diameter_angle:'Угол на диаметр',circle_on_side_tangent:'Окр. на стороне △ + касательная',tangent_angle_arc:'Касательная + дуга',right_tri_height_circle:'△ + окр. на высоте',tri_circumscribed:'△ + описанная окр.',tri_incircle:'△ + вписанная окр.',tri_inscribed_in_circle:'△ вписан в окр.',circle_only:'Окружность',triangle:'Треугольник',trapezoid:'Трапеция',trapezoid_perp_diag:'Трапеция: диагонали ⊥',parallelogram:'Параллелограмм',pgram_bisectors:'Пар-мм: биссектрисы',rhombus:'Ромб',rhombus_diag_dist:'Ромб: расст. до стороны',rectangle:'Прямоугольник',square:'Квадрат',perp_bisector:'Серединный ⊥',parallel_segments:'Отрезки на параллельных',tri_perp_median:'△: ⊥ к медиане'};
    const parts=[nm[parsed.scenario]||parsed.scenario];
    const extras=parsed.features.filter(f=>['height','median','bisector','diagonal','incircle','circumcircle','central_angle','inscribed_angle','diameter'].includes(f));
    const eNames={height:'высота',median:'медиана',bisector:'биссектриса',diagonal:'диагональ',incircle:'вписанная окр.',circumcircle:'описанная окр.',central_angle:'центральный угол',inscribed_angle:'вписанный угол',diameter:'диаметр'};
    extras.forEach(e=>parts.push(eNames[e]||e));
    for(const seg in parsed.segments)parts.push(`${seg}=${fmtN(parsed.segments[seg])}`);
    for(const[l,v]of Object.entries(parsed.angles))parts.push(`∠${l}=${v}°`);
    if(parsed.radiusVal)parts.push(`R=${parsed.radiusVal}`);
    nfoEl.innerHTML='<b>Распознано:</b> '+parts.join(' · ');nfoEl.classList.add('vis');
  }catch(e){showErr('Ошибка: '+e.message);ph.style.display='';}
}
function fmtN(v){return Math.abs(v-Math.round(v))<.01?Math.round(v):v.toFixed(1);}
function showErr(m){errEl.textContent=m;errEl.classList.add('vis');}

// ====== EXAMPLES MODAL ======
const EX_CATS=[
  {id:'circle', label:'Окружность', icon:'',
   items: EXAMPLES.filter((_,i)=>i<=6)},
  {id:'triangle', label:'Треугольники', icon:'',
   items: EXAMPLES.filter((_,i)=>i>=7&&i<=14)},
  {id:'quad', label:'Четырёхугольники', icon:'',
   items: EXAMPLES.filter((_,i)=>i>=15&&i<=21)},
  {id:'angles', label:'Углы', icon:'',
   items: EXAMPLES.filter((_,i)=>i>=22&&i<=28)},
  {id:'oge', label:'Дополнительные задачи', icon:'',
   items: EXAMPLES.filter((_,i)=>i>=29)},
];

const modal=document.getElementById('exModal');
const modalTabs=document.getElementById('modalTabs');
const modalBody=document.getElementById('modalBody');
let activeCat=0;

function renderModalTabs(){
  modalTabs.innerHTML='';
  EX_CATS.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='mtab'+(i===activeCat?' active':'');
    btn.textContent=cat.icon+' '+cat.label;
    btn.addEventListener('click',()=>{activeCat=i;renderModalTabs();renderModalGrid();});
    modalTabs.appendChild(btn);
  });
}

function renderModalGrid(){
  const cat=EX_CATS[activeCat];
  modalBody.innerHTML='';
  const grid=document.createElement('div');
  grid.className='ex-grid';
  cat.items.forEach(ex=>{
    const card=document.createElement('button');
    card.className='ex-card';
    card.innerHTML=`<div class="ex-card-title">${ex.t}</div><div class="ex-card-text">${ex.s}</div>`;
    card.addEventListener('click',()=>{
      ta.value=ex.s;
      closeModal();
      ta.focus();
      generate();
    });
    grid.appendChild(card);
  });
  modalBody.appendChild(grid);
}

function openModal(){activeCat=0;renderModalTabs();renderModalGrid();modal.classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}

document.getElementById('exBtn').addEventListener('click',openModal);
document.getElementById('modalClose').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('open'))closeModal();});
</script>
